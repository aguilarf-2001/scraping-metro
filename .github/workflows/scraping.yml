name: Scraping Metro

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: 20

      - run: npm install

      - run: node scrapingMetro.js
        env:
          FIREBASE_KEY: ${{ secrets.FIREBASE_KEY }}